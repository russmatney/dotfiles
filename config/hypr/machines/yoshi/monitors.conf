# Monitor configuration for yoshi
# Framework 16-inch AMD
# See https://wiki.hyprland.org/Configuring/Monitors/

$laptop-monitor = eDP-1
$desktop-monitor = DP-2

monitor = $laptop-monitor, highres, auto-up, 0.9
# monitor = $laptop-monitor, disable
# flip
# monitor = $laptop-monitor, highres, auto-up, 1, transform, 2

monitor = $desktop-monitor, preferred, auto-up, 1.2
# monitor = $desktop-monitor, disable

exec-once = ~/.local/bin/handle_monitors.sh
