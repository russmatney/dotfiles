## TOGGLES

# cycle hidden toggles
# bind = $mainMod, R, togglespecialworkspace,

# term
windowrule = tag +term, match:class kitty
windowrule = tag +term, match:class alacritty
windowrule = tag +term, match:class foot
# bind = $mainMod, Return, exec, $terminal
# bind = $mainMod, Return, exec, $alacritty-in-tmux
bind = $mainMod, Return, exec, terminal_in_wsp.bb
# bind = $mainMod, Return, exec, $foot-in-tmux

# workspace-emacs
windowrule = tag +emacs, match:class Emacs
# bind = $mainMod shift, Return, exec, $emacs
bind = $mainMod shift, Return, exec, emacs_in_wsp.bb

# floating-emacs
windowrule = tag +floatingemacs, match:class Emacs, match:title floating-emacs
windowrule = workspace special:floatingemacs, match:tag floatingemacs
bind = $mainMod, e, exec, toggle_workspace_stack.bb floatingemacs
workspace = special:floatingemacs, on-created-empty:$emacs-create-floating
# workspace = special:floatingemacs, on-created-empty:find_or_create.bb floating-emacs

# journal
windowrule = tag +journalemacs, match:class Emacs, match:title journal
windowrule = workspace special:journalemacs, match:tag journalemacs
bind = $mainMod, u, exec, toggle_workspace_stack.bb journalemacs
# TODO prefer $emacs program to clawebb starts
workspace = special:journalemacs, on-created-empty:$emacs-create-journal

# neovide
windowrule = tag +neovide, match:class neovide
windowrule = animation popin, match:tag neovide
windowrule = workspace special:neovide, match:tag neovide
bind = $mainMod alt, n, exec, toggle_workspace_stack.bb neovide
workspace = special:neovide, on-created-empty:neovide

# floating-kitty
windowrule = tag +floatingkitty, match:class kitty, match:title floating-kitty
windowrule = workspace special:floatingkitty, match:tag floatingkitty
bind = $mainMod alt, t, exec, toggle_workspace_stack.bb floatingkitty
workspace = special:floatingkitty, on-created-empty:$kitty-create-floating

# finder/thunar/files
windowrule = tag +files, match:class org.kde.dolphin
windowrule = tag +files, match:class thunar
windowrule = workspace special:files, match:tag files
bind = $mainMod, y, exec, toggle_workspace_stack.bb files
workspace = special:files, on-created-empty:dolphin

# web
windowrule = tag +web, match:class firefox
windowrule = tag +web, match:class zen
windowrule = workspace special:web, match:tag web
bind = $mainMod, t, exec, toggle_workspace_stack.bb web
workspace = special:web, on-created-empty:firefox

# other web
windowrule = tag +otherweb, match:class chromium-browser
windowrule = workspace special:otherweb, match:tag otherweb
bind = $mainMod alt, b, exec, toggle_workspace_stack.bb otherweb

# music/spotify
windowrule = tag +music, match:class spotify
windowrule = workspace special:music, match:tag music
bind = $mainMod alt, s, exec, toggle_workspace_stack.bb music
workspace = special:spotify, on-created-empty:find_or_create.bb spotify

# ticktick
windowrule = tag +ticktick, match:class ticktick
windowrule = workspace special:ticktick, match:tag ticktick
bind = $mainMod alt, u, exec, toggle_workspace_stack.bb ticktick
workspace = special:ticktick, on-created-empty:ticktick

# slack
windowrule = tag +slack, match:class slack
windowrule = workspace special:slack, match:tag slack
bind = $mainMod alt, a, exec, toggle_workspace_stack.bb slack
workspace = special:slack, on-created-empty:slack

# discord
windowrule = tag +discord, match:class discord
windowrule = workspace special:discord, match:tag discord
bind = $mainMod alt, d, exec, toggle_workspace_stack.bb discord
workspace = special:discord, on-created-empty:discord

# aseprite
windowrule = tag +aseprite, match:class aseprite
windowrule = workspace special:aseprite, match:tag aseprite
bind = $mainMod alt, p, exec, toggle_workspace_stack.bb aseprite
workspace = special:aseprite, on-created-empty:aseprite

# obsidian
windowrule = tag +obsidian, match:class obsidian
windowrule = workspace special:obsidian, match:tag obsidian
bind = $mainMod alt, o, exec, toggle_workspace_stack.bb obsidian
workspace = special:obsidian, on-created-empty:obsidian
